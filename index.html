<body>
  <h1>LoudKult Pre-save</h1>
  <p>Click below to pre-save your track/playlist:</p>
  <button id="presave-btn">Pre-save</button>

  <script>
    const params = new URLSearchParams(window.location.search);
    const track = params.get('track');
    const playlist = params.get('playlist');
    const contentId = track || playlist;

    if(!contentId) {
      document.body.innerHTML += "<p style='color:red;'>No track or playlist ID in URL.</p>";
    }

    document.getElementById('presave-btn').addEventListener('click', () => {
      if(!contentId) return;

      // Tracking events
      if(typeof fbq !== "undefined") fbq('track', 'ViewContent', {content_id: contentId});
      if(typeof ttq !== "undefined") ttq.track('ViewContent', {content_id: contentId});
      if(typeof snaptr !== "undefined") snaptr('track','VIEW_CONTENT');

      // Send to backend login with track/playlist as query
      const type = track ? 'track' : 'playlist';
      window.location.href = `/api/login?type=${type}&id=${contentId}`;
    });
  </script>
</body>
</html>
